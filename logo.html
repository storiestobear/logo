<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stories to Bear</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#2a2a2a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:#000;}
.screen.active{display:flex;}

/* S1 */
#s1{background:#1c1c1c;align-items:stretch;}
.s1-top{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 16px 16px;}
.s1-top svg{width:100px;height:50px;color:#fff;}
.s1-top h1{font-size:19px;font-weight:700;}
.drop-zone{margin:0 16px 32px;border:1.5px dashed #666;border-radius:18px;overflow:hidden;cursor:pointer;position:relative;background:#2a2a2a;flex:1;display:flex;flex-direction:column;}
.drop-zone input{display:none;}
.dz-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:0;}
.dz-preview{width:100%;flex:1;background:transparent;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.dz-preview-hint{font-size:14px;color:#2a2a2a;text-align:center;padding:12px;}
.dz-logo{width:28%;opacity:0.25;}
.dz-logo svg{width:100%;height:auto;display:block;color:#fff;}
.dz-label{font-size:14px;color:#888;background:#2a2a2a;border-radius:10px;padding:10px 28px;margin-top:4px;display:inline-block;}
.drop-zone.drag{border-color:#444;background:#212121;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;flex-shrink:0;background:#252525;border-bottom:1px solid #1a1a1a;}
.tb-title{font-size:15px;font-weight:600;}
.tb-btn{background:none;border:none;color:#888;font-size:15px;cursor:pointer;padding:6px 10px;border-radius:8px;}
.tb-btn.ok{background:#fff;color:#000;font-weight:700;border-radius:10px;padding:8px 18px;font-size:14px;}

/* S2 crop */
.crop-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
#cropCv{position:absolute;top:0;left:0;}
.mask{position:absolute;background:rgba(0,0,0,0.55);pointer-events:none;}
#cropBorder{position:absolute;border:2px solid rgba(255,255,255,0.75);pointer-events:none;box-sizing:border-box;border-radius:2px;}
.fmt-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;background:#212121;flex-shrink:0;scrollbar-width:none;}
.fmt-bar::-webkit-scrollbar{display:none;}
.fmt-btn{flex-shrink:0;padding:6px 14px;border:1.5px solid #3a3a3a;border-radius:20px;background:none;color:#888;font-size:13px;cursor:pointer;}
.fmt-btn.on{border-color:#ddd;color:#fff;font-weight:600;}
.zoom-bar{display:flex;align-items:center;gap:8px;padding:8px 14px 14px;background:#212121;flex-shrink:0;}
.zb{background:#252525;border:none;color:#888;font-size:16px;width:34px;height:34px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.zoom-bar input[type=range]{flex:1;accent-color:#666;}
.zoom-bar span{font-size:12px;color:#444;min-width:36px;text-align:right;}

/* S3 */
.prev-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;}
#prevCv{display:block;}
#lHandle{position:absolute;cursor:grab;touch-action:none;user-select:none;}
#lHandle:active{cursor:grabbing;}
#lHandle svg{width:100%;height:100%;display:block;pointer-events:none;}
.hborder{position:absolute;inset:-5px;border:2px dashed rgba(255,255,255,0.7);border-radius:4px;pointer-events:none;box-shadow:0 0 0 1px rgba(0,0,0,0.4);}
.ctrl-panel{flex-shrink:0;background:#252525;padding:11px 16px 6px;border-top:1px solid #2a2a2a;}
.cr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.08em;min-width:52px;}
.seg{display:flex;gap:3px;}
.seg button{padding:6px 10px;border:1px solid #3a3a3a;border-radius:7px;background:#2a2a2a;color:#888;font-size:12px;cursor:pointer;}
.seg button.on{border-color:#555;background:#2a2a2a;color:#ddd;}
input[type=range]{flex:1;accent-color:#666;cursor:pointer;}
.vl{font-size:12px;color:#777;min-width:30px;text-align:right;}
.sw{width:28px;height:28px;border-radius:6px;border:1px solid #2a2a2a;overflow:hidden;position:relative;cursor:pointer;flex-shrink:0;}
.sw input[type=color]{position:absolute;width:220%;height:220%;top:-60%;left:-60%;cursor:pointer;border:none;padding:0;}
.hx{background:#2a2a2a;border:1px solid #1e1e1e;border-radius:6px;color:#888;font-size:12px;padding:5px 8px;font-family:monospace;width:80px;}
.hx:focus{outline:none;border-color:#444;}
.act-bar{display:flex;gap:8px;padding:10px 16px 26px;background:#212121;flex-shrink:0;}
.act{flex:1;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;}
.act:active{opacity:.75;}
.a-save{background:#252525;color:#888;}
.a-share{background:#fff;color:#000;}
</style>
</head>

// Build colored SVG data URL — returns Promise<HTMLImageElement>
function makeLogo(hexColor, w, h) {
  return new Promise((res, rej) => {
    // Simple string replace on the LOGOCOLOR placeholder
    let s = '';
    const parts = LOGO_TPL.split('LOGOCOLOR');
    for (let i = 0; i < parts.length; i++) {
      s += parts[i];
      if (i < parts.length - 1) s += hexColor;
    }
    s = s.replace('width="100%"', 'width="' + w + '"')
         .replace('height="100%"', 'height="' + h + '"');
    const blob = new Blob([s], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.onerror = (e) => { URL.revokeObjectURL(url); rej(e); };
    img.src = url;
  });
}

// ── State ──
let srcImg = null;
let cropR = null;         // null=original, [rw,rh]=ratio
let cZoom = 1, cPanX = 0, cPanY = 0;
let lX = 0.82, lY = 0.82;  // logo center, 0-1 of preview canvas
let lCol = 'white';         // 'white'|'black'|'custom'
let lCus = '#ff6b9d';
let lKont = 'none';         // 'none'|'thin'|'thick'
let lOpac = 0.85;
let lSz = 0.18;

const RMAP = {'orig':null,'1:1':[1,1],'4:5':[4,5],'9:16':[9,16],'16:9':[16,9],'1.91:1':[1.91,1]};

function getHex() {
  if (lCol === 'white') return '#ffffff';
  if (lCol === 'black') return '#000000';
  return lCus;
}

function onFile(inp) { const f=inp.files[0]; if(f) loadImg(f); inp.value=''; }

function loadImg(f) {
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      cPanX = img.naturalWidth/2; cPanY = img.naturalHeight/2;
      cropR = null;
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('on'));
      document.querySelector('.fmt-btn[data-r="orig"]').classList.add('on');
      go('s2');
      requestAnimationFrame(initCrop);
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

// ── CROP ──
const cropCv = document.getElementById('cropCv');
const cropCtx = cropCv.getContext('2d');
const cropWrap = document.getElementById('cropWrap');

function initCrop() {
  const aw=cropWrap.clientWidth, ah=cropWrap.clientHeight;
  cropCv.width=aw; cropCv.height=ah;
  cropCv.style.width=aw+'px'; cropCv.style.height=ah+'px';
  fitCrop(); drawCrop();
}

function fitCrop() {
  const aw=cropCv.width, ah=cropCv.height;
  const iw=srcImg.naturalWidth, ih=srcImg.naturalHeight;
  if (!cropR) {
    cZoom = Math.min(aw/iw, ah/ih) * 0.9;
  } else {
    const [rw,rh]=cropR;
    let rW,rH;
    if(aw/ah>rw/rh){rH=ah*0.88;rW=rH*(rw/rh);}else{rW=aw*0.88;rH=rW*(rh/rw);}
    cZoom = Math.max(rW/iw, rH/ih);
  }
  cPanX=srcImg.naturalWidth/2; cPanY=srcImg.naturalHeight/2;
  document.getElementById('zsl').value=cZoom;
  document.getElementById('zpct').textContent=Math.round(cZoom*100)+'%';
}

function drawCrop() {
  const cw=cropCv.width, ch=cropCv.height;
  cropCtx.clearRect(0,0,cw,ch);
  cropCtx.fillStyle='#000'; cropCtx.fillRect(0,0,cw,ch);
  const dw=srcImg.naturalWidth*cZoom, dh=srcImg.naturalHeight*cZoom;
  const dx=cw/2-cPanX*cZoom, dy=ch/2-cPanY*cZoom;
  cropCtx.drawImage(srcImg,dx,dy,dw,dh);
  updateMasks(cw,ch);
}

function getCropRect(cw,ch) {
  if (!cropR) return {x:0,y:0,w:cw,h:ch};
  const [rw,rh]=cropR;
  let rW,rH;
  if(cw/ch>rw/rh){rH=ch*0.88;rW=rH*(rw/rh);}else{rW=cw*0.88;rH=rW*(rh/rw);}
  return {x:(cw-rW)/2,y:(ch-rH)/2,w:rW,h:rH};
}

function updateMasks(cw,ch) {
  const r=getCropRect(cw,ch);
  const el=(id,css)=>{document.getElementById(id).style.cssText=css;};
  el('mT',`top:0;left:0;right:0;height:${r.y}px`);
  el('mB',`bottom:0;left:0;right:0;height:${ch-r.y-r.h}px`);
  el('mL',`top:${r.y}px;left:0;width:${r.x}px;height:${r.h}px`);
  el('mR',`top:${r.y}px;right:0;width:${cw-r.x-r.w}px;height:${r.h}px`);
  el('cropBorder',`top:${r.y}px;left:${r.x}px;width:${r.w}px;height:${r.h}px`);
}

function setZoom(v){cZoom=v;document.getElementById('zpct').textContent=Math.round(v*100)+'%';drawCrop();}
function czoom(d){const v=Math.max(0.05,Math.min(8,Math.round((cZoom+d)*20)/20));document.getElementById('zsl').value=v;setZoom(v);}

let cp=false,lTX=0,lTY=0,p0=0,pZ0=1;
cropCv.addEventListener('mousedown',e=>{cp=true;lTX=e.clientX;lTY=e.clientY;});
window.addEventListener('mousemove',e=>{if(!cp)return;cPanX-=(e.clientX-lTX)/cZoom;cPanY-=(e.clientY-lTY)/cZoom;lTX=e.clientX;lTY=e.clientY;drawCrop();});
window.addEventListener('mouseup',()=>cp=false);
cropCv.addEventListener('touchstart',e=>{if(e.touches.length===1){cp=true;lTX=e.touches[0].clientX;lTY=e.touches[0].clientY;}if(e.touches.length===2){cp=false;p0=pd(e.touches);pZ0=cZoom;}},{passive:true});
cropCv.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&cp){cPanX-=(e.touches[0].clientX-lTX)/cZoom;cPanY-=(e.touches[0].clientY-lTY)/cZoom;lTX=e.touches[0].clientX;lTY=e.touches[0].clientY;drawCrop();}if(e.touches.length===2){const d=pd(e.touches);cZoom=Math.max(0.05,Math.min(8,pZ0*(d/p0)));document.getElementById('zsl').value=cZoom;document.getElementById('zpct').textContent=Math.round(cZoom*100)+'%';drawCrop();}},{passive:false});
cropCv.addEventListener('touchend',()=>cp=false,{passive:true});
function pd(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

document.querySelectorAll('.fmt-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fmt-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); cropR=RMAP[b.dataset.r]; fitCrop(); drawCrop();
}));

window.addEventListener('resize',()=>{

});

// Build the cropped image at output resolution
function buildCropped() {
  const OUT=1080;
  let ow,oh;
  if(!cropR){ow=srcImg.naturalWidth;oh=srcImg.naturalHeight;}
  else{const[rw,rh]=cropR;ow=OUT;oh=Math.round(OUT*rh/rw);}
  const tmp=document.createElement('canvas');tmp.width=ow;tmp.height=oh;
  const tc=tmp.getContext('2d');
  tc.fillStyle='#000';tc.fillRect(0,0,ow,oh);
  const cw=cropCv.width,ch=cropCv.height;
  const dw=srcImg.naturalWidth*cZoom,dh=srcImg.naturalHeight*cZoom;
  const dx=cw/2-cPanX*cZoom,dy=ch/2-cPanY*cZoom;
  if(!cropR){
    // map the full canvas area to output
    const sx=(0-dx)/cZoom,sy=(0-dy)/cZoom,sw=cw/cZoom,sh=ch/cZoom;
    tc.drawImage(srcImg,sx,sy,sw,sh,0,0,ow,oh);
  } else {
    const r=getCropRect(cw,ch);
    const sx=(r.x-dx)/cZoom,sy=(r.y-dy)/cZoom,sw=r.w/cZoom,sh=r.h/cZoom;
    tc.drawImage(srcImg,sx,sy,sw,sh,0,0,ow,oh);
  }
  return tmp;
}

// Draw logo onto a canvas context at given pixel position/size
async function drawLogo(ctx, hexColor, contour, opacity, px, py, pw, ph) {
  // Contour: draw shifted copies first
  if (contour !== 'none') {
    const cpx = contour === 'thin' ? Math.max(1, Math.round(pw * 0.02)) : Math.max(2, Math.round(pw * 0.05));
    const cHex = (hexColor === '#000000') ? '#ffffff' : '#000000';
    const cImg = await makeLogo(cHex, pw, ph);
    ctx.globalAlpha = opacity * 0.75;
    const steps = [-cpx, 0, cpx];
    for (const dx of steps) {
      for (const dy of steps) {
        if (dx===0 && dy===0) continue;
        ctx.drawImage(cImg, px+dx, py+dy, pw, ph);
      }
    }
  }
  // Main logo
  const lImg = await makeLogo(hexColor, pw, ph);
  ctx.globalAlpha = opacity;
  ctx.drawImage(lImg, px, py, pw, ph);
  ctx.globalAlpha = 1;
}

// ── S3 PREVIEW ──
const prevCv = document.getElementById('prevCv');
const prevCtx = prevCv.getContext('2d');
const prevWrap = document.getElementById('prevWrap');
const lHandle = document.getElementById('lHandle');
const hSvg = document.getElementById('hSvg');

let croppedCache = null;
let rpTimer = null;
let rendering = false;

function initS3() {
  croppedCache = buildCropped(); // build IMMEDIATELY while s2 canvas still valid
  lX=0.82; lY=0.82;
  requestAnimationFrame(doRender);
}

function rp() {
  if (rpTimer) clearTimeout(rpTimer);
  rpTimer = setTimeout(doRender, 50);
}

async function doRender() {
  if (!croppedCache || rendering) return;
  rendering = true;
  try {
    const pw=prevWrap.clientWidth, ph=prevWrap.clientHeight;
    const iw=croppedCache.width, ih=croppedCache.height;
    const sc=Math.min(pw/iw, ph/ih);
    const dw=Math.round(iw*sc), dh=Math.round(ih*sc);

    prevCv.width=dw; prevCv.height=dh;
    prevCv.style.width=dw+'px'; prevCv.style.height=dh+'px';

    // Draw image
    prevCtx.drawImage(croppedCache,0,0,dw,dh);

    // Logo position & size on preview canvas
    const lw=Math.round(dw*lSz);
    const lh=Math.round(lw*(276/275));
    const lpx=Math.round(lX*dw - lw/2);
    const lpy=Math.round(lY*dh - lh/2);

    await drawLogo(prevCtx, getHex(), lKont, lOpac, lpx, lpy, lw, lh);

    // Update handle
    const cr=prevCv.getBoundingClientRect();
    const wr=prevWrap.getBoundingClientRect();
    lHandle.style.left=(cr.left-wr.left+lpx)+'px';
    lHandle.style.top =(cr.top -wr.top +lpy)+'px';
    lHandle.style.width=lw+'px';
    lHandle.style.height=lh+'px';

    // Tint the handle SVG to match logo color
    hSvg.querySelectorAll('path').forEach(p => {
      p.style.fill = getHex();
    });
  } finally { rendering = false; }
}

// Handle drag
let ld=false;
lHandle.addEventListener('mousedown',e=>{ld=true;e.preventDefault();});
lHandle.addEventListener('touchstart',e=>{ld=true;e.preventDefault();},{passive:false});
window.addEventListener('mousemove',e=>{if(!ld)return;moveLogo(e.clientX,e.clientY);});
window.addEventListener('touchmove',e=>{if(!ld||e.touches.length!==1)return;e.preventDefault();moveLogo(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('mouseup',()=>ld=false);
window.addEventListener('touchend',()=>{ld=false;},{passive:true});

function moveLogo(cx,cy) {
  const cr=prevCv.getBoundingClientRect();
  lX=Math.max(0,Math.min(1,(cx-cr.left)/cr.width));
  lY=Math.max(0,Math.min(1,(cy-cr.top)/cr.height));
  rp();
}

  }
}

// ── EXPORT ──
async function buildFinal() {
  // Always rebuild from source — never rely on cache
  const out = buildCropped();
  const oc = out.getContext('2d');
  const ow=out.width, oh=out.height;

  const lw=Math.round(ow*lSz);
  const lh=Math.round(lw*(276/275));
  const lpx=Math.round(lX*ow - lw/2);
  const lpy=Math.round(lY*oh - lh/2);

  await drawLogo(oc, getHex(), lKont, lOpac, lpx, lpy, lw, lh);
  return out;
}

async function doSave() {
  const out=await buildFinal();
  const a=document.createElement('a');
  a.download='storiestobear_'+Date.now()+'.jpg';
  a.href=out.toDataURL('image/jpeg',0.95);
  a.click();
}

async function doShare() {
  const out=await buildFinal();
  out.toBlob(async blob=>{
    const file=new File([blob],'storiestobear.jpg',{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'Stories to Bear'});return;}catch(e){if(e.name==='AbortError')return;}
    }
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
  },'image/jpeg',0.95);
}
</script>
